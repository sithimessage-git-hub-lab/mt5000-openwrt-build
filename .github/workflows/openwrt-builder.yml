name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.2
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  SSH_ACTIONS: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        ./$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        
        # 1. 先运行 make defconfig 生成基础配置
        echo "运行 make defconfig 生成基础配置..."
        make defconfig
    
        # 2. 直接设置 GL-MT5000 配置
        echo "设置 GL-MT5000 设备配置..."
    
        # 删除现有的设备配置
        sed -i '/CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_/d' .config
    
        # 添加 GL-MT5000 配置
        echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_glinet_gl-mt5000=y" >> .config
    
        # 3. 验证配置（不要运行 oldconfig！）
        echo "验证设备配置..."
        if grep -q "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_glinet_gl-mt5000=y" .config; then
            echo "✅ GL-MT5000 设备已选择"
            echo "当前目标配置："
            grep "^CONFIG_TARGET" .config | head -10
        else
            echo "❌ GL-MT5000 设备未选择"
            echo "当前配置："
            grep "CONFIG_TARGET_DEVICE" .config
            exit 1
        fi
    
        # 4. 下载包
        echo "开始下载包..."
        make download -j8
    
        # 5. 清理小文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Debug - Final config check
      run: |
        cd openwrt
        echo "=== 最终配置检查 ==="
        echo "1. 设备配置："
        grep "CONFIG_TARGET_DEVICE" .config
        
        echo "2. 架构配置："
        grep "CONFIG_TARGET_ARCH\|CONFIG_ARCH" .config
        
        echo "3. 完整目标配置："
        grep "^CONFIG_TARGET" .config
        
        echo "4. 检查 make info 输出："
        make info 2>&1 | grep -A10 "Target:" || true

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        
        # 1. 验证最终配置（不要运行 oldconfig！）
        echo "最终配置验证："
        if grep -q "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_glinet_gl-mt5000=y" .config; then
            echo "✅ GL-MT5000 设备配置正确"
            echo "设备配置："
            grep "CONFIG_TARGET_DEVICE" .config
        else
            echo "❌ GL-MT5000 设备配置错误"
            echo "当前配置："
            grep "CONFIG_TARGET_DEVICE" .config
            exit 1
        fi
    
        # 2. 显示编译信息
        echo "编译信息："
        make info 2>&1 | grep -E "Target:|Target System:|Subtarget:|Target Profile:" || true
    
        # 3. 开始编译
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
    
        # 4. 设置输出变量
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%HM")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # 检查固件是否生成
        if [ -d "openwrt/bin/targets/mediatek/filogic" ]; then
            cd openwrt/bin/targets/mediatek/filogic
            rm -rf packages
            echo "FIRMWARE=$PWD" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
        else
            echo "❌ 固件目录不存在"
            echo "检查目录结构："
            find openwrt/bin -type d | head -20
            exit 1
        fi

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Prepare release files
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # 创建 release.txt
        echo "GL-MT5000 OpenWrt 固件" > release.txt
        echo "编译时间: $(date)" >> release.txt
        echo "设备: GL.iNet GL-MT5000" >> release.txt
        echo "OpenWrt 版本: v25.12.2" >> release.txt
        echo "" >> release.txt
        echo "包含插件:" >> release.txt
        echo "- helloworld (SSR Plus+)" >> release.txt
        echo "- LuCI 界面" >> release.txt
        echo "- 基础网络功能" >> release.txt

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
